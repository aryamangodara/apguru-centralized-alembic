name: Apply Alembic migrations (prod)

# Applies Alembic migrations to the PRODUCTION MySQL the moment an approved PR lands on
# main. Runs on the self-hosted runner on the EC2 host (same box as the grader) so it can
# reach prod MySQL; prod creds live in a host-only .env that is never in git. The human
# checkpoint is the PR-approval gate (see the "Protect main" ruleset); this job auto-applies.
on:
  push:
    branches: [main]
    paths:                      # optional noise filter; dispatch still works for anything
      - 'alembic/**'
      - 'alembic.ini'
      - 'requirements.txt'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch: {}

# Never let two migration runs touch alembic_version at once; let an in-flight run finish.
concurrency:
  group: migrate-prod-db
  cancel-in-progress: false

env:
  # Host-only env file holding the prod DB_* creds (never in git).
  ALEMBIC_ENV_FILE: ${{ vars.ALEMBIC_ENV_FILE || '/opt/apguru/alembic/.env' }}
  PY_IMAGE: python:3.13-slim

jobs:
  alembic-upgrade:
    name: alembic upgrade head (prod)
    # Pin to the second runner registered on the EC2 host for THIS repo (label below).
    runs-on: [self-hosted, apguru-alembic]
    steps:
      - name: Checkout merged main commit
        uses: actions/checkout@v4

      - name: alembic upgrade head
        run: |
          # No `-e`: we capture the container's exit code, always write a summary,
          # then exit with that code so the job status still reflects success/failure.
          set -uo pipefail
          log="$(mktemp)"

          # Repo mounted READ-ONLY and bytecode writes disabled: the container runs as
          # root, so anything it wrote into the workspace (e.g. __pycache__/*.pyc) would
          # be root-owned and break the next checkout's `git clean` (run as github-runner).
          docker run --rm \
            --env-file "$ALEMBIC_ENV_FILE" \
            -e PYTHONDONTWRITEBYTECODE=1 \
            -v "$GITHUB_WORKSPACE":/repo:ro -w /repo \
            "$PY_IMAGE" \
            sh -eu -c '
              pip install --no-cache-dir -q -r requirements.txt
              echo "== alembic heads (must be exactly one) =="
              alembic heads
              if [ "$(alembic heads | grep -c "(head)")" -ne 1 ]; then
                echo "MULTIHEAD=$(alembic heads | grep -c "(head)")"; exit 3
              fi
              before=$(alembic current 2>/dev/null | head -n1 | cut -d" " -f1)
              echo "BEFORE=${before:-<none>}"
              echo "== alembic upgrade head =="
              alembic upgrade head
              after=$(alembic current 2>/dev/null | head -n1 | cut -d" " -f1)
              echo "AFTER=${after:-<none>}"
            ' 2>&1 | tee "$log"
          rc=${PIPESTATUS[0]}

          before=$(sed -n "s/^BEFORE=//p" "$log" | tail -n1)
          after=$(sed -n "s/^AFTER=//p"  "$log" | tail -n1)
          multihead=$(sed -n "s/^MULTIHEAD=//p" "$log" | tail -n1)
          applied=$(grep -oE "Running upgrade [0-9A-Za-z_]+ -> [0-9A-Za-z_]+" "$log" | sed "s/Running upgrade //" || true)

          # --- Outcome -> run summary panel + a top-of-run annotation -------------
          {
            echo "### Alembic â€” production migration"
            echo ""
            if [ "$rc" -eq 3 ]; then
              echo "âťŚ **Refused:** expected exactly one head, found \`${multihead:-?}\`. Reconcile the chain to a single head, then re-run."
            elif [ "$rc" -ne 0 ]; then
              echo "âťŚ **Migration failed** (exit \`$rc\`). See the step log above (bad creds, DB unreachable, or a broken migration)."
            elif [ -n "$applied" ]; then
              echo "âś… **Upgraded** prod: \`${before:-<none>}\` â†’ \`${after}\`"
              echo ""
              echo "Revisions applied:"
              echo '```'
              echo "$applied"
              echo '```'
            else
              echo "âś… **Already at head** â€” prod is at \`${after:-$before}\`; nothing to apply."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$rc" -eq 3 ]; then
            echo "::error title=Alembic::Multiple heads (${multihead:-?}) â€” refused to migrate"
          elif [ "$rc" -ne 0 ]; then
            echo "::error title=Alembic::alembic upgrade head failed (exit $rc)"
          elif [ -n "$applied" ]; then
            echo "::notice title=Alembic::Upgraded prod ${before:-<none>} -> ${after}"
          else
            echo "::notice title=Alembic::No migrations to apply â€” prod already at ${after:-$before}"
          fi

          exit "$rc"
